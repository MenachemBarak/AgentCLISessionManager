<!doctype html>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #0a0907; font-family: Inter, sans-serif; color: #fff; overflow: hidden; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); background-clip: padding-box; border: 2px solid transparent; }
  @keyframes pulse-ring {
    0% { transform: scale(0.7); opacity: 0.9; }
    70% { transform: scale(2); opacity: 0; }
    100% { transform: scale(2); opacity: 0; }
  }
  .pulse-ring { animation: pulse-ring 1.8s ease-out infinite; }
  @keyframes row-enter-anim {
    0% { background: rgba(215, 162, 74, 0.18); transform: translateX(-4px); opacity: 0; }
    40% { opacity: 1; transform: translateX(0); }
    100% { background: rgba(215, 162, 74, 0); }
  }
  .row-enter { animation: row-enter-anim 2.2s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  ::selection { background: rgba(215, 162, 74, 0.35); }
  @keyframes typingPulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
<div id="root"></div>
<!--
  Daemon-mode bearer-token injection (ADR-18 / Task #42 Phase 3c).
  When the UI shim launches the webview against the daemon, it puts the
  per-install bearer token in the URL fragment:
        http://127.0.0.1:8765/#token=<hex>
  The fragment is NEVER sent to the server (by RFC 3986 + browser
  behaviour), so it cannot leak via server logs. This inline script runs
  BEFORE every module script below — it parses the fragment and patches
  window.fetch and the WebSocket constructor to attach the token to
  every same-origin request. In non-daemon (legacy) mode no fragment is
  present and both patches are no-ops, preserving existing behaviour.
-->
<script>
(function () {
  var m = /(?:^|[#&])token=([0-9a-fA-F]+)/.exec(window.location.hash || '');
  if (!m) return;
  var token = m[1];
  window._daemonToken = token;
  // Strip the fragment from the URL bar so the token doesn't linger in
  // the visible location if the user happens to right-click-inspect.
  try { history.replaceState(null, '', window.location.pathname + window.location.search); } catch (e) {}

  var origFetch = window.fetch.bind(window);
  window.fetch = function (input, init) {
    init = init || {};
    var headers = new Headers(init.headers || (typeof input === 'object' && input && input.headers) || {});
    if (!headers.has('Authorization')) headers.set('Authorization', 'Bearer ' + token);
    init.headers = headers;
    return origFetch(input, init);
  };

  // WebSocket doesn't support custom headers in browsers. We pass the
  // token in the URL query so the daemon can read it server-side
  // (handler lives in backend/app.py's websocket endpoint — Phase 3d
  // wires WS auth). For now this is forward-compat: frames sent before
  // WS auth lands are harmless since the URL includes the token.
  var OrigWS = window.WebSocket;
  window.WebSocket = function (url, protocols) {
    try {
      var u = new URL(url, window.location.href);
      if (!u.searchParams.has('token')) u.searchParams.set('token', token);
      url = u.toString();
    } catch (e) {}
    return protocols === undefined ? new OrigWS(url) : new OrigWS(url, protocols);
  };
  window.WebSocket.prototype = OrigWS.prototype;
  window.WebSocket.CONNECTING = OrigWS.CONNECTING;
  window.WebSocket.OPEN       = OrigWS.OPEN;
  window.WebSocket.CLOSING    = OrigWS.CLOSING;
  window.WebSocket.CLOSED     = OrigWS.CLOSED;
})();
</script>
