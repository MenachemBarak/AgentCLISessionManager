<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Claude Sessions</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #0a0907; font-family: Inter, sans-serif; color: #fff; overflow: hidden; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); background-clip: padding-box; border: 2px solid transparent; }
  @keyframes pulse-ring {
    0% { transform: scale(0.7); opacity: 0.9; }
    70% { transform: scale(2); opacity: 0; }
    100% { transform: scale(2); opacity: 0; }
  }
  .pulse-ring { animation: pulse-ring 1.8s ease-out infinite; }
  @keyframes row-enter-anim {
    0% { background: rgba(215, 162, 74, 0.18); transform: translateX(-4px); opacity: 0; }
    40% { opacity: 1; transform: translateX(0); }
    100% { background: rgba(215, 162, 74, 0); }
  }
  .row-enter { animation: row-enter-anim 2.2s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  ::selection { background: rgba(215, 162, 74, 0.35); }
  @keyframes typingPulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel" src="utils.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="active-strip.jsx"></script>
<script type="text/babel" src="compact-list.jsx"></script>
<script type="text/babel" src="transcript.jsx"></script>
<script type="text/babel" src="preview.jsx"></script>
<script type="text/babel" src="tweaks.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
