name: E2E

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Runs the Playwright suite against the dev server (python -m backend.cli).
  # Fast (no PyInstaller build) so every PR gets UI feedback in under 3 min.
  e2e-dev:
    name: e2e (dev server)
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: e2e
        env:
          CI: "1"
          CSV_TEST_MODE: "1"
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-dev
          path: e2e/playwright-report
          retention-days: 14

  # Builds the actual PyInstaller exe and runs the SAME Playwright suite
  # against it — this is the job that catches release-only regressions
  # like the pywinpty 3.x STATUS_CONTROL_C_EXIT bug.
  e2e-exe:
    name: e2e (built exe)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build windowed exe
        run: pyinstaller pyinstaller.spec --noconfirm
        shell: bash

      - name: Rename exe to the expected launcher name
        run: |
          Move-Item -Force dist\claude-sessions-viewer.exe dist\csv-e2e.exe
        shell: pwsh

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Launch built exe in server-only mode
        shell: pwsh
        env:
          CSV_TEST_MODE: "1"
        run: |
          Start-Process -FilePath .\dist\csv-e2e.exe `
            -ArgumentList '--server-only','--port','8769','--no-browser' `
            -WindowStyle Hidden
          # Wait until /api/status is reachable (exe starts a uvicorn worker).
          for ($i = 0; $i -lt 30; $i++) {
            try {
              $r = Invoke-RestMethod 'http://127.0.0.1:8769/api/status' -TimeoutSec 2
              if ($r.ready) { Write-Output "ready after $i polls (v$($r.version))"; break }
            } catch { Start-Sleep -Seconds 1 }
          }

      - name: Run Playwright against the exe
        working-directory: e2e
        env:
          CI: "1"
          CSV_APP_URL: http://127.0.0.1:8769
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-exe
          path: e2e/playwright-report
          retention-days: 14

      - name: Stop exe
        if: always()
        shell: pwsh
        run: Get-Process csv-e2e -ErrorAction SilentlyContinue | Stop-Process -Force
