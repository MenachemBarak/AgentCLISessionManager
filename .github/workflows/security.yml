name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC — catches newly disclosed CVEs.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  pip-audit:
    name: pip-audit (CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pip-audit
        run: pip install pip-audit==2.7.3
      - name: Audit runtime dependencies
        run: pip-audit -r backend/requirements.txt --strict

  bandit:
    name: bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install bandit
        run: pip install "bandit[toml]==1.7.10"
      - name: Run bandit
        run: bandit -c pyproject.toml -r backend hooks

  codeql:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          config-file: ./.github/codeql/codeql-config.yml
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
