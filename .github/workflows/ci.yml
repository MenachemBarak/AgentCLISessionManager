name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: test (py${{ matrix.python }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx build

      - name: Run pytest
        env:
          PYTHONIOENCODING: utf-8
        run: pytest tests/test_backend_api.py tests/test_hook.py tests/test_packaging.py -v --tb=short

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install lint + type-check tools
        run: |
          pip install ruff==0.7.4 mypy==1.13.0 types-psutil
          pip install -r backend/requirements.txt
      - name: Ruff check
        run: ruff check backend hooks tests
      - name: Ruff format (check)
        run: ruff format --check backend hooks tests
      - name: Mypy
        run: mypy backend hooks

  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pre-commit
        run: pip install pre-commit==4.0.1
      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure
