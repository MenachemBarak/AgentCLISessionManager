name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: test (py${{ matrix.python }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov httpx build

      - name: Run pytest with coverage (full suite, gated at 60%)
        env:
          PYTHONIOENCODING: utf-8
          # Tests like test_session_pin.py import `backend.app` at
          # module top, which captures CLAUDE_HOME at import time.
          # Point it at the fixture so those tests find seeded sessions.
          CLAUDE_HOME: ${{ github.workspace }}/tests/fixtures/claude-home
        # T-62: gate on backend coverage. Local Windows baseline is
        # 61%; Linux is ~57% (pywinpty/Windows swap script is dead
        # weight there). Floor set 1pt below Linux baseline so the
        # gate works on both platforms. Target 80% — ramp plan in
        # tickets.md.
        # test_watcher: Windows file-lock flake unrelated to coverage.
        # Use bash explicitly so the line-continuation backslashes work
        # on the Windows runner (PowerShell-default would ParserError).
        shell: bash
        run: |
          pytest tests/ --ignore=tests/test_watcher.py \
            --cov=backend --cov-report=term-missing:skip-covered \
            --cov-report=html:coverage-html --cov-fail-under=55 -v --tb=short

      - name: Upload coverage HTML on failure
        if: failure() && matrix.python == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: coverage-html
          retention-days: 7
          if-no-files-found: ignore

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install lint + type-check tools
        run: |
          pip install ruff==0.7.4 mypy==1.13.0 types-psutil
          pip install -r backend/requirements.txt
      - name: Ruff check
        run: ruff check backend hooks tests
      - name: Ruff format (check)
        run: ruff format --check backend hooks tests
      - name: Mypy
        run: mypy backend hooks

  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pre-commit
        run: pip install pre-commit==4.0.1
      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure
