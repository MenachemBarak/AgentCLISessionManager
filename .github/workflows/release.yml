name: Release

# Triggers on annotated tag push matching v*.*.*. The tag must match
# backend/__version__.py — the build step aborts if they diverge.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # to create the GitHub Release

jobs:
  build:
    name: Build wheel + sdist + Windows zip
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build==1.2.2 "twine>=6.1.0" packaging

      - name: Verify tag matches __version__
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(python -c "import importlib.util, sys; s = importlib.util.spec_from_file_location('v', 'backend/__version__.py'); m = importlib.util.module_from_spec(s); s.loader.exec_module(m); print(m.__version__)")
          echo "tag=$TAG  package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match backend/__version__.py ($PKG). Bump __version__ before tagging." >&2
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build wheel + sdist
        run: python -m build --wheel --sdist

      - name: Check distributions with twine
        run: twine check --strict dist/*

      - name: Build Windows zip
        run: |
          VER="${{ steps.version.outputs.version }}"
          STAGING="staging/claude-sessions-viewer-${VER}"
          mkdir -p "$STAGING"
          # Copy what the launcher needs; exclude dev-only and large dirs.
          rsync -a \
            --exclude='.git/' --exclude='.github/' --exclude='.venv/' \
            --exclude='__pycache__/' --exclude='.pytest_cache/' --exclude='.ruff_cache/' \
            --exclude='dist/' --exclude='build/' --exclude='*.egg-info/' \
            --exclude='tests/' --exclude='playground/' --exclude='shots/' \
            --exclude='docs/screenshots/' --exclude='staging/' \
            --exclude='.pre-commit-config.yaml' \
            ./ "$STAGING/"
          (cd staging && zip -r "../dist/claude-sessions-viewer-${VER}-windows.zip" "claude-sessions-viewer-${VER}")
          ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*

  exe:
    name: Build Windows x64 .exe (PyInstaller)
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install runtime deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller==6.11.1
      - name: Build exe (one-file — legacy raw-exe asset)
        run: pyinstaller pyinstaller.spec --noconfirm --clean
      - name: Build one-folder tree (for installer — closes #45)
        # The one-folder build drops AgentManager.exe + _internal/
        # alongside it. No runtime _MEI extraction → no "Failed to
        # remove temporary directory" dialog. The Inno Setup installer
        # packages this tree; the raw one-file .exe stays published
        # so the existing auto-update chain keeps working.
        run: pyinstaller pyinstaller-onedir.spec --noconfirm --clean
      - name: Rename exe with version + publish legacy alias
        shell: bash
        run: |
          VER="${{ needs.build.outputs.version }}"
          # PyInstaller produced dist/AgentManager.exe (spec `name` was
          # changed in v1.0.0 as part of the rebrand). We publish under
          # the new versioned name AND copy to the legacy name so
          # clients on v0.9.x (whose updater looks for
          # `claude-sessions-viewer-<ver>-windows-x64.exe`) continue to
          # see the update banner and can upgrade into v1.0.0+.
          mv "dist/AgentManager.exe" "dist/AgentManager-${VER}-windows-x64.exe"
          cp "dist/AgentManager-${VER}-windows-x64.exe" \
             "dist/claude-sessions-viewer-${VER}-windows-x64.exe"
          ls -la dist/
      - name: Smoke-test exe boots
        shell: bash
        run: |
          VER="${{ needs.build.outputs.version }}"
          EXE="dist/AgentManager-${VER}-windows-x64.exe"
          "$EXE" --version
          "$EXE" --version | grep -qE "AgentManager ${VER}$"
      - name: Smoke-test exe serves API (server-only mode)
        shell: bash
        run: |
          VER="${{ needs.build.outputs.version }}"
          EXE="dist/AgentManager-${VER}-windows-x64.exe"
          export CLAUDE_HOME="$PWD/tests/fixtures/claude-home"
          "$EXE" --server-only --no-browser --port 8799 --log-level warning &
          SERVER_PID=$!
          for i in $(seq 1 40); do
            if curl -s http://127.0.0.1:8799/api/status | grep -q '"ready":true'; then break; fi
            sleep 0.5
          done
          BODY=$(curl -s http://127.0.0.1:8799/api/status)
          echo "$BODY"
          echo "$BODY" | grep -q "\"version\":\"${VER}\""
          ITEMS=$(curl -s http://127.0.0.1:8799/api/sessions | python -c "import sys,json; print(len(json.load(sys.stdin)['items']))")
          test "$ITEMS" = "2"
          kill $SERVER_PID || true
      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            dist/AgentManager-*-windows-x64.exe
            dist/claude-sessions-viewer-*-windows-x64.exe

      # ADR-18 / Task #48: build a real Windows installer (Inno Setup)
      # alongside the raw exe. Gives users Add/Remove Programs entry,
      # standard install UX, and a clean uninstall path via the existing
      # --uninstall CLI. The raw exe stays published for the existing
      # auto-update chain (drop-in swap helper).
      - name: Install Inno Setup
        shell: pwsh
        run: |
          # Inno Setup 6 is preinstalled on windows-latest under
          # "C:\Program Files (x86)\Inno Setup 6\iscc.exe" on GHA images.
          # Fall back to choco if absent.
          $iscc = Get-Command iscc.exe -ErrorAction SilentlyContinue
          if (-not $iscc) {
            $cand = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
            if (Test-Path $cand) {
              $dir = Split-Path $cand
              Add-Content -Path $env:GITHUB_PATH -Value $dir
            } else {
              choco install innosetup --version=6.2.2 -y --no-progress
            }
          }
      - name: Build installer (wraps one-folder tree — closes #45)
        # PowerShell (not bash) — Git-Bash/MSYS on Windows path-translates
        # any arg starting with `/` into a filesystem path, mangling
        # Inno Setup's `/D<var>=<value>` flags. ISCC then sees "more
        # than one script filename" and bails. pwsh passes args through.
        shell: pwsh
        run: |
          $ver = "${{ needs.build.outputs.version }}"
          # One-folder build emits dist/AgentManager/ with AgentManager.exe
          # at its root and _internal/ alongside. Installer packages it
          # recursively (see installer/agentmanager.iss [Files] section).
          $folder = "dist\AgentManager"
          if (-not (Test-Path $folder)) { throw "onedir build output missing: $folder" }
          New-Item -ItemType Directory -Force installer\Output | Out-Null
          & iscc /Qp "/DMyAppVersion=$ver" "/DMyAppFolder=..\$folder" installer\agentmanager.iss
          if ($LASTEXITCODE -ne 0) { throw "iscc failed with exit $LASTEXITCODE" }
          Get-ChildItem installer\Output\
      - name: Smoke-test installer (silent + uninstall)
        shell: pwsh
        run: |
          $ver = "${{ needs.build.outputs.version }}"
          $setup = "installer/Output/AgentManager-$ver-setup.exe"
          Write-Host "Running silent install: $setup /VERYSILENT /SUPPRESSMSGBOXES /NORESTART"
          Start-Process -Wait -FilePath $setup -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART"
          $installed = "$env:LOCALAPPDATA\Programs\AgentManager\AgentManager.exe"
          if (-not (Test-Path $installed)) { throw "installer did not place exe at $installed" }
          & $installed --version
          # Uninstall via the registered uninstaller.
          $unins = "$env:LOCALAPPDATA\Programs\AgentManager\unins000.exe"
          if (Test-Path $unins) {
            Write-Host "Running silent uninstall"
            Start-Process -Wait -FilePath $unins -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART"
          }
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/Output/AgentManager-*-setup.exe

  verify:
    name: Verify built wheel installs and runs
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: dist
      - name: Install built wheel in a fresh venv
        run: |
          python -m venv /tmp/rel-venv
          /tmp/rel-venv/bin/pip install --upgrade pip
          /tmp/rel-venv/bin/pip install dist/claude_sessions_viewer-*.whl
      - name: Verify CLI --version matches tag
        run: |
          # Console-script entry-point still `claude-sessions-viewer`
          # (pyproject [project.scripts] unchanged for v1.0.0 — the
          # Python package/wheel name is an internal artifact). The
          # --version output is rebranded to "AgentManager <ver>".
          OUT=$(/tmp/rel-venv/bin/claude-sessions-viewer --version)
          echo "$OUT"
          echo "$OUT" | grep -qE "AgentManager ${{ needs.build.outputs.version }}$"
      - name: Smoke-test server against mock CLAUDE_HOME
        run: |
          export CLAUDE_HOME="$PWD/tests/fixtures/claude-home"
          # --server-only: Linux CI runners have no display, so we skip the
          # pywebview window and just validate the HTTP surface.
          /tmp/rel-venv/bin/claude-sessions-viewer --server-only --no-browser --port 8799 --log-level warning &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:8799/api/status | grep -q '"ready":true'; then break; fi
            sleep 0.3
          done
          BODY=$(curl -s http://127.0.0.1:8799/api/status)
          echo "$BODY"
          echo "$BODY" | grep -q "\"version\":\"${{ needs.build.outputs.version }}\""
          ITEMS=$(curl -s http://127.0.0.1:8799/api/sessions | python -c "import sys,json; print(len(json.load(sys.stdin)['items']))")
          test "$ITEMS" = "2"  # fixture has exactly 2 sessions
          kill $SERVER_PID

  release:
    name: Create GitHub Release
    needs: [build, verify, exe]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download wheel/sdist/zip artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: dist
      - name: Download Windows exe artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-exe
          path: dist
      - name: Download Windows installer artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-installer
          path: dist
      - name: Extract changelog entry for this version
        id: changelog
        run: |
          VER="${{ needs.build.outputs.version }}"
          # Grab the section starting with `## [VER]` up to (but not including)
          # the next `## [`. Use fgrep-style exact matching so regex metachars
          # in brackets aren't interpreted.
          python <<EOF > release_notes.md
          import sys
          ver = "$VER"
          start = f"## [{ver}]"
          out, capturing = [], False
          for line in open("CHANGELOG.md", encoding="utf-8"):
              if line.startswith(start):
                  capturing = True
                  continue
              if capturing and line.startswith("## ["):
                  break
              if capturing:
                  out.append(line)
          sys.stdout.write("".join(out).strip() + "\n")
          EOF
          if [ ! -s release_notes.md ] || [ "$(wc -c < release_notes.md)" -lt 10 ]; then
            echo "No changelog entry for v$VER — aborting release creation." >&2
            exit 1
          fi
          echo "--- release notes ---"
          cat release_notes.md
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ needs.build.outputs.version }}"
          gh release create "v$VER" \
            --title "v$VER" \
            --notes-file release_notes.md \
            dist/claude_sessions_viewer-*.whl \
            dist/claude_sessions_viewer-*.tar.gz \
            dist/claude-sessions-viewer-*-windows.zip \
            dist/AgentManager-*-windows-x64.exe \
            dist/claude-sessions-viewer-*-windows-x64.exe \
            dist/AgentManager-*-setup.exe
